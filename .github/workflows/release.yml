name: Release

on:
  push:
    tags:
      - "v*"
      - "plugin-v*"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Cleanup
        run: |
          echo "Before cleanup"
          df -h

          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          sudo apt-get autoremove -y
          sudo docker system prune -af

          echo "After cleanup"
          df -h

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create binaries directory
        run: mkdir ./binaries

      - name: Build and push geth + plugin
        if: startsWith(github.ref_name, 'v')
        uses: docker/bake-action@v6
        env:
          REGISTRY: ghcr.io
          REPOSITORY: ${{ github.repository }}
          GIT_COMMIT: ${{ github.sha }}
          GIT_VERSION: ${{ github.ref_name }}
          IMAGE_TAGS: ${{ github.ref_name }}
        with:
          files: docker-bake.hcl
          targets: geth,binaries
          push: true
          set: |
            *.platform=linux/amd64,linux/arm64
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
            binaries.output=type=local,dest=./binaries

      - name: Build plugin only
        if: "!startsWith(github.ref_name, 'v')"
        uses: docker/bake-action@v6
        env:
          GIT_VERSION: ${{ github.ref_name }}
        with:
          files: docker-bake.hcl
          targets: plugin-binaries
          set: |
            *.platform=linux/amd64,linux/arm64
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
            plugin-binaries.output=type=local,dest=./binaries

      # --- geth artifacts (v* only) ---

      - name: Check version label
        if: startsWith(github.ref_name, 'v')
        run: 'binaries/linux_amd64/geth version | grep -q "Version: $(echo ${{ github.ref_name }} | cut -c 2-10)"'

      - name: Compress geth binaries
        if: startsWith(github.ref_name, 'v')
        run: |
          (cd binaries/linux_amd64 && zip -q - geth) > geth-${{ github.ref_name }}-linux-amd64.zip
          (cd binaries/linux_arm64 && zip -q - geth) > geth-${{ github.ref_name }}-linux-arm64.zip

      - name: Create genesis.zip
        if: startsWith(github.ref_name, 'v')
        run: zip -r genesis.zip genesis

      - name: Create setup.sh
        if: startsWith(github.ref_name, 'v')
        run: |
          sed -e 's#__REPOSITORY__#${{ github.repository }}#' .github/setup_template.sh | \
          sed -e 's#__RELEASE__#${{ github.ref_name }}#' > setup.sh

      # --- plugin artifacts (v* and plugin-v*) ---
      # Plugin binaries are always built and released for both v* and plugin-v* tags.
      # When geth is updated (v*), the plugin must also be rebuilt to maintain
      # build compatibility (same go.sum, Go version, and build tags).

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign plugin (amd64)
        run: |
          cosign sign-blob --yes --new-bundle-format \
            --bundle binaries/linux_amd64/suspicious_txfilter.so.bundle \
            binaries/linux_amd64/suspicious_txfilter.so

      - name: Sign plugin (arm64)
        run: |
          cosign sign-blob --yes --new-bundle-format \
            --bundle binaries/linux_arm64/suspicious_txfilter.so.bundle \
            binaries/linux_arm64/suspicious_txfilter.so

      - name: Create plugin metadata (amd64)
        run: |
          go run txfilter/cmd/createmeta/metadata_creator.go \
            binaries/linux_amd64/suspicious_txfilter.so.bundle \
            - \
            binaries/linux_amd64/suspicious_txfilter.json \
            ${{ github.ref_name }} \
            "https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/tags/${{ github.ref_name }}" \
            "https://token.actions.githubusercontent.com"

      - name: Create plugin metadata (arm64)
        run: |
          go run txfilter/cmd/createmeta/metadata_creator.go \
            binaries/linux_arm64/suspicious_txfilter.so.bundle \
            - \
            binaries/linux_arm64/suspicious_txfilter.json \
            ${{ github.ref_name }} \
            "https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/tags/${{ github.ref_name }}" \
            "https://token.actions.githubusercontent.com"

      - name: Compress plugin binaries
        run: |
          (cd binaries/linux_amd64 && zip -q - suspicious_txfilter.so suspicious_txfilter.so.bundle suspicious_txfilter.json) > suspicious_txfilter-${{ github.ref_name }}-linux-amd64.zip
          (cd binaries/linux_arm64 && zip -q - suspicious_txfilter.so suspicious_txfilter.so.bundle suspicious_txfilter.json) > suspicious_txfilter-${{ github.ref_name }}-linux-arm64.zip

      # --- upload all artifacts ---

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.ref_name }}
          path: |
            geth-*.zip
            suspicious_txfilter-*.zip
            genesis.zip
            setup.sh

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.ref_name }}
          path: artifacts

      - name: Create sha256sums.txt
        run: (cd artifacts && sha256sum *) > sha256sums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: true
          files: |
            artifacts/*
            sha256sums.txt
