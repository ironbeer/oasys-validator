name: Release

on:
  push:
    tags:
      - "v*"
      - "plugin-v*"

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      id-token: write
      packages: write
      contents: read
    steps:
      - name: Cleanup
        run: |
          echo "Before cleanup"
          df -h

          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          sudo apt-get autoremove -y
          sudo docker system prune -af

          echo "After cleanup"
          df -h

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: startsWith(github.ref_name, 'v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create binaries directory
        run: mkdir ./binaries

      - name: Build and push geth + plugin
        if: startsWith(github.ref_name, 'v')
        uses: docker/bake-action@v6
        env:
          REGISTRY: ghcr.io
          REPOSITORY: ${{ github.repository }}
          GIT_COMMIT: ${{ github.sha }}
          GIT_VERSION: ${{ github.ref_name }}
          IMAGE_TAGS: "${{ github.ref_name }}-${{ matrix.arch }}"
        with:
          files: docker-bake.hcl
          targets: geth,binaries
          push: true
          set: |
            *.cache-from=type=gha,scope=${{ matrix.arch }}
            *.cache-to=type=gha,scope=${{ matrix.arch }},mode=max
            binaries.output=type=local,dest=./binaries

      - name: Build plugin only
        if: "!startsWith(github.ref_name, 'v')"
        uses: docker/bake-action@v6
        env:
          GIT_COMMIT: ${{ github.sha }}
          GIT_VERSION: ${{ github.ref_name }}
        with:
          files: docker-bake.hcl
          targets: plugin-binaries
          set: |
            *.cache-from=type=gha,scope=${{ matrix.arch }}
            *.cache-to=type=gha,scope=${{ matrix.arch }},mode=max
            plugin-binaries.output=type=local,dest=./binaries

      # --- geth artifacts (v* only) ---

      - name: Check version label
        if: startsWith(github.ref_name, 'v')
        run: 'binaries/geth version | grep -q "Version: $(echo ${{ github.ref_name }} | cut -c 2-10)"'

      - name: Compress geth binary
        if: startsWith(github.ref_name, 'v')
        run: |
          (cd binaries && zip -q - geth) > geth-${{ github.ref_name }}-linux-${{ matrix.arch }}.zip

      - name: Create genesis.zip
        if: startsWith(github.ref_name, 'v') && matrix.arch == 'amd64'
        run: zip -r genesis.zip genesis

      - name: Create setup.sh
        if: startsWith(github.ref_name, 'v') && matrix.arch == 'amd64'
        run: |
          sed -e 's#__REPOSITORY__#${{ github.repository }}#' .github/setup_template.sh | \
          sed -e 's#__RELEASE__#${{ github.ref_name }}#' > setup.sh

      # --- plugin artifacts (v* and plugin-v*) ---
      # Plugin binaries are always built and released for both v* and plugin-v* tags.
      # When geth is updated (v*), the plugin must also be rebuilt to maintain
      # build compatibility (same go.sum, Go version, and build tags).

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Rename plugin binary to match CDN naming convention
        run: |
          mv binaries/suspicious_txfilter.so binaries/suspicious_txfilter_linux_${{ matrix.arch }}.so

      - name: Sign plugin
        run: |
          cosign sign-blob --yes --new-bundle-format \
            --bundle binaries/suspicious_txfilter_linux_${{ matrix.arch }}.so.bundle \
            binaries/suspicious_txfilter_linux_${{ matrix.arch }}.so

      - name: Create plugin metadata
        run: |
          go run txfilter/cmd/createmeta/metadata_creator.go \
            binaries/suspicious_txfilter_linux_${{ matrix.arch }}.so.bundle \
            - \
            binaries/suspicious_txfilter_linux_${{ matrix.arch }}.json \
            ${{ github.ref_name }} \
            "https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/tags/${{ github.ref_name }}" \
            "https://token.actions.githubusercontent.com"

      - name: Compress plugin binaries
        run: |
          cd binaries && zip -q - \
            suspicious_txfilter_linux_${{ matrix.arch }}.so \
            suspicious_txfilter_linux_${{ matrix.arch }}.so.bundle \
            suspicious_txfilter_linux_${{ matrix.arch }}.json \
            > ../suspicious_txfilter-${{ github.ref_name }}-linux-${{ matrix.arch }}.zip

      # --- upload artifacts ---

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.ref_name }}-${{ matrix.arch }}
          path: |
            geth-*.zip
            suspicious_txfilter-*.zip
            genesis.zip
            setup.sh

  # Create multi-arch Docker manifest from per-arch images
  docker-manifest:
    name: Docker manifest
    needs: build
    if: startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}:${{ github.ref_name }} \
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}-amd64 \
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}-arm64

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "${{ github.ref_name }}-*"
          merge-multiple: true

      - name: Create sha256sums.txt
        run: (cd artifacts && sha256sum *) > sha256sums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: true
          files: |
            artifacts/*
            sha256sums.txt
